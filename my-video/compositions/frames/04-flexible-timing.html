<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>04-flexible-timing</title>
    <!-- Note: everything in <head> is discarded by the HyperFrames sub-composition
         loader — it only clones <template> contents. Kept here for source readability. -->
  </head>
  <body>
    <template>
      <style>

        #root {
          position: absolute;
          inset: 0;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          container-type: size;
          font-family: 'Inter', sans-serif;
        }

        .clip {
          position: absolute;
          inset: 0;
        }

        /* Full-bleed ground — a dedicated clip layer, never painted on #root. */
        .bg-field {
          background: #0b1e3c;
        }

        /* Eyebrow — plain gold tracked label above the card, full-width so it
           centers without a transform (keeps it conflict-free for GSAP y tweens). */
        .eyebrow {
          position: absolute;
          left: 0;
          top: 200px;
          width: 100%;
          margin: 0;
          font-family: 'Montserrat', sans-serif;
          font-weight: 600;
          font-size: 2.6cqw;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          text-align: center;
          color: #d4af37;
        }

        /* Card — asymmetric, top-anchored, ~70% width, spans most of the upper
           two-thirds. Centered via `left` offset (not transform) so GSAP's own
           `y` tween on this element never collides with a CSS transform. */
        .card {
          position: absolute;
          left: 15cqw;
          top: 300px;
          width: 70cqw;
          height: 960px;
          box-sizing: border-box;
          background: rgba(212, 175, 55, 0.045);
          border: 1.75px solid rgba(212, 175, 55, 0.38);
          border-radius: 20px;
          box-shadow: none;
          padding: 110px 70px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 110px;
        }

        .headline {
          width: 100%;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          row-gap: 0.2em;
          margin: 0;
        }

        .word {
          display: inline-block;
          font-family: 'Montserrat', sans-serif;
          font-weight: 700;
          font-size: 7.4cqw;
          line-height: 1.3;
          letter-spacing: -0.01em;
          color: #f5f1e6;
          margin-right: 0.35em;
        }

        #w4 {
          margin-right: 0;
        }

        .bar-wrap {
          position: relative;
          width: 100%;
          height: 100px;
        }

        .track {
          position: absolute;
          left: 0;
          top: 50%;
          margin-top: -12px;
          width: 100%;
          height: 24px;
          background: rgba(212, 175, 55, 0.15);
          border-radius: 12px;
          overflow: hidden;
        }

        .fill {
          width: 100%;
          height: 100%;
          display: block;
          background: #d4af37;
          border-radius: 12px;
          transform-origin: left center;
        }

        .tick {
          position: absolute;
          right: 0;
          top: 22px;
          width: 5px;
          height: 56px;
          background: #d4af37;
          border-radius: 3px;
          transform-origin: center bottom;
        }

        .tick-label {
          position: absolute;
          right: 0;
          top: 84px;
          white-space: nowrap;
          text-align: right;
          font-family: 'Montserrat', sans-serif;
          font-weight: 600;
          font-size: 2.2cqw;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #d4af37;
        }
      </style>

      <div
        id="root"
        data-composition-id="04-flexible-timing"
        data-width="1080"
        data-height="1920"
        data-duration="5"
      >
        <!-- Full-bleed navy ground, entire shot -->
        <div class="clip bg-field" data-start="0" data-duration="5" data-track-index="0"></div>

        <!-- Eyebrow, own track (overlaps the card in time) -->
        <div class="clip" data-start="0" data-duration="5" data-track-index="1">
          <p class="eyebrow" id="eyebrow">How It Works</p>
        </div>

        <!-- Card: headline (per-word reveal) + progress bar, own track -->
        <div class="clip" data-start="0" data-duration="5" data-track-index="2">
          <div class="card" id="card">
            <div class="headline" id="headline">
              <span class="word" id="w1">No</span>
              <span class="word" id="w2">required</span>
              <span class="word" id="w3">annual</span>
              <span class="word" id="w4">amount</span>
            </div>
            <div class="bar-wrap">
              <div class="track">
                <div class="fill" id="fill"></div>
              </div>
              <div class="tick" id="tick"></div>
              <div class="tick-label" id="tick-label">Year 10</div>
            </div>
          </div>
        </div>
      </div>

      <script>
        (function () {
          window.__timelines = window.__timelines || {};

          var eyebrow = document.getElementById('eyebrow');
          var card = document.getElementById('card');
          var fill = document.getElementById('fill');
          var tick = document.getElementById('tick');
          var tickLabel = document.getElementById('tick-label');

          // Static start states for the bar graphic (measured transforms, not CSS-hidden).
          gsap.set(fill, { scaleX: 0 });
          gsap.set(tick, { opacity: 0, scaleY: 0.25 });
          gsap.set(tickLabel, { opacity: 0, y: 10 });

          var tl = gsap.timeline({ paused: true });

          // Scene 1 (0.0-1.3s) — gold eyebrow fades up, card fades + slides a short
          // distance into place (top-anchored, asymmetric).
          tl.fromTo(eyebrow, { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.55, ease: 'power3.out' }, 0.05);
          tl.fromTo(card, { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.85, ease: 'power3.out' }, 0.15);

          // Scene 2 (1.3-3.0s) — headline reveals per-word, landing center-card.
          tl.fromTo(
            '.word',
            { opacity: 0, y: 24 },
            { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out', stagger: 0.28 },
            1.3,
          );

          // Scene 3 (3.0-5.0s) — gold progress-bar track fills left->right; tick mark
          // and "YEAR 10" label arrive as the fill completes; settle + subtle jitter.
          tl.to(fill, { scaleX: 1, duration: 1.2, ease: 'power2.out' }, 3.0);
          tl.fromTo(
            tick,
            { opacity: 0, scaleY: 0.25 },
            { opacity: 1, scaleY: 1, duration: 0.4, ease: 'power3.out' },
            3.9,
          );
          tl.fromTo(
            tickLabel,
            { opacity: 0, y: 10 },
            { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out' },
            3.95,
          );

          // Subtle jitter on the settled card, low amplitude, to the end of the shot.
          var phase = { p: 0 };
          tl.to(
            phase,
            {
              p: Math.PI * 2,
              duration: 0.6,
              ease: 'none',
              onUpdate: function () {
                var y = Math.sin(phase.p) * 2; // 2px — barely-perceptible
                card.style.transform = 'translateY(' + y + 'px)';
              },
            },
            4.4,
          );

          window.__timelines['04-flexible-timing'] = tl;
        })();
      </script>
    </template>
  </body>
</html>
