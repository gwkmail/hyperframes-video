<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata only for the source file; the runtime discards everything outside <template> -->
    <title>07 — The penalty</title>
  </head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap');

        /* Root — styled by #root only, never a class (scoping rule) */
        #root {
          position: relative;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          background: #0b1e3c;
          font-family: "Space Grotesk", "Inter", sans-serif;
        }

        .clip {
          position: absolute;
          inset: 0;
        }

        /* ---- background field ---- */
        .bg-field {
          background: radial-gradient(
            120% 90% at 50% 34%,
            #0d234a 0%,
            #0b1e3c 55%,
            #081730 100%
          );
        }

        /* ---- content layer ---- */
        .content {
          position: absolute;
          inset: 0;
        }

        .eyebrow {
          position: absolute;
          top: 300px;
          left: 0;
          right: 0;
          text-align: center;
          font-family: "Space Grotesk", sans-serif;
          font-weight: 600;
          font-size: 36px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #d4af37;
          opacity: 0;
        }

        .stats-wrap {
          position: absolute;
          inset: 0;
        }

        /* ---- main hero slot: 50% and 25%+label occupy the same anchor, mutually exclusive ---- */
        .stat-main-slot {
          position: absolute;
          top: 600px;
          left: 0;
          right: 0;
          height: 420px;
        }

        .stat-50-wrap,
        .stat-25-wrap {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          opacity: 0;
        }

        .stat-50-inner {
          position: relative;
          display: inline-block;
        }

        .stat-50 {
          font-family: "Space Grotesk", sans-serif;
          font-weight: 700;
          font-size: 200px;
          line-height: 1;
          letter-spacing: -4px;
          color: #d4af37;
          font-variant-numeric: tabular-nums;
        }

        .strike-line {
          position: absolute;
          top: calc(50% - 7px);
          left: -6%;
          right: -6%;
          height: 14px;
          border-radius: 7px;
          background: #d4af37;
          transform-origin: left center;
          transform: scaleX(0);
        }

        .stat-25 {
          font-family: "Space Grotesk", sans-serif;
          font-weight: 700;
          font-size: 150px;
          line-height: 1;
          letter-spacing: -4px;
          color: #d4af37;
          font-variant-numeric: tabular-nums;
        }

        .stat-25-label {
          font-family: "Space Grotesk", sans-serif;
          font-weight: 600;
          font-size: 42px;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          color: #f5f1e6;
          opacity: 0;
        }

        /* ---- supporting stat: 10% ---- */
        .stat-10-wrap {
          position: absolute;
          top: 1120px;
          left: 0;
          right: 0;
          height: 240px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 14px;
          opacity: 0;
        }

        .stat-10 {
          font-family: "Space Grotesk", sans-serif;
          font-weight: 700;
          font-size: 110px;
          line-height: 1;
          letter-spacing: -2px;
          color: #d4af37;
          font-variant-numeric: tabular-nums;
        }

        .stat-10-label {
          font-family: "Space Grotesk", sans-serif;
          font-weight: 600;
          font-size: 30px;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          color: #f5f1e6;
          text-align: center;
          max-width: 800px;
        }
      </style>

      <div
        id="root"
        data-composition-id="07-penalty"
        data-width="1080"
        data-height="1920"
        data-duration="5"
      >
        <div class="clip bg-field" data-start="0" data-duration="5" data-track-index="0"></div>

        <div class="content clip" data-start="0" data-duration="5" data-track-index="1">
          <div class="eyebrow" id="eyebrow">The Penalty</div>

          <div class="stats-wrap" id="stats-wrap">
            <div class="stat-main-slot">
              <div class="stat-50-wrap" id="stat-50-wrap">
                <div class="stat-50-inner">
                  <span class="stat-50" id="stat-50">50%</span>
                  <div class="strike-line" id="strike-line"></div>
                </div>
              </div>

              <div class="stat-25-wrap" id="stat-25-wrap">
                <span class="stat-25" id="stat-25">0%</span>
                <div class="stat-25-label">if missed</div>
              </div>
            </div>

            <div class="stat-10-wrap" id="stat-10-wrap">
              <span class="stat-10" id="stat-10">0%</span>
              <div class="stat-10-label">if fixed within 2 years</div>
            </div>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          var tl = gsap.timeline({ paused: true });

          var eyebrow = document.getElementById("eyebrow");
          var stat50Wrap = document.getElementById("stat-50-wrap");
          var strikeLine = document.getElementById("strike-line");
          var stat25Wrap = document.getElementById("stat-25-wrap");
          var stat25 = document.getElementById("stat-25");
          var stat25Label = stat25Wrap.querySelector(".stat-25-label");
          var stat10Wrap = document.getElementById("stat-10-wrap");
          var stat10 = document.getElementById("stat-10");
          var statsWrap = document.getElementById("stats-wrap");

          // ---- Scene 1 (0.0-1.2s): eyebrow + "50%" flash-cut + strike-through dismissal ----

          tl.fromTo(
            eyebrow,
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" },
            0,
          );

          // Flash-cut, near-instant appearance (no fade) — matches Frame 1/2/9's hard-cut signature
          tl.fromTo(
            stat50Wrap,
            { opacity: 0, scale: 0.96 },
            { opacity: 1, scale: 1, duration: 0.1, ease: "power1.out" },
            0.08,
          );

          // Strike-through draws left -> right across "50%"
          tl.fromTo(
            strikeLine,
            { scaleX: 0 },
            { scaleX: 1, duration: 0.5, ease: "power2.out" },
            0.55,
          );

          // Dismiss dip just before the hard cut
          tl.to(stat50Wrap, { opacity: 0.45, duration: 0.15, ease: "power1.out" }, 1.0);

          // ---- Hard cut at 1.2s: "50%" clears, "25%" begins counting ----

          tl.set(stat50Wrap, { opacity: 0 }, 1.2);
          tl.set(stat25Wrap, { opacity: 1 }, 1.2);

          // ---- Scene 2 (1.2-3.2s): counting-dynamic-scale count-up 0 -> 25 ----

          var counter25 = { value: 0, fontSize: 150 };
          tl.to(
            counter25,
            {
              value: 25,
              fontSize: 280,
              duration: 1.4,
              ease: "power3.out",
              onUpdate: function () {
                stat25.textContent = Math.round(counter25.value) + "%";
                stat25.style.fontSize = counter25.fontSize + "px";
              },
            },
            1.2,
          );

          tl.fromTo(
            stat25Label,
            { opacity: 0, y: 12 },
            { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
            1.5,
          );

          // ---- Scene 3 (3.2-5.0s): "10%" ticks in beside/below, then hold with subtle jitter ----

          tl.fromTo(
            stat10Wrap,
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" },
            3.2,
          );

          var counter10 = { value: 0 };
          tl.to(
            counter10,
            {
              value: 10,
              duration: 0.5,
              ease: "power2.out",
              onUpdate: function () {
                stat10.textContent = Math.round(counter10.value) + "%";
              },
            },
            3.2,
          );

          // Subtle jitter across the hold (finite, bounded — no infinite repeat)
          var phase = { p: 0 };
          tl.to(
            phase,
            {
              p: Math.PI * 2 * 0.5,
              duration: 1.1,
              ease: "none",
              onUpdate: function () {
                var y = Math.sin(phase.p) * 2.4;
                statsWrap.style.transform = "translateY(" + y + "px)";
              },
            },
            3.9,
          );

          window.__timelines["07-penalty"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
