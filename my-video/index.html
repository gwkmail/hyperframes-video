<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="assets/vendor/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0B1E3C;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="44"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="el-01-hook"
        class="scene"
        data-composition-id="01-hook"
        data-composition-src="compositions/frames/01-hook.html"
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
      ></div>

      <div
        id="el-02-stakes"
        class="scene"
        data-composition-id="02-stakes"
        data-composition-src="compositions/frames/02-stakes.html"
        data-start="4"
        data-duration="4.5"
        data-track-index="1"
      ></div>

      <div
        id="el-03-rule-name"
        class="scene"
        data-composition-id="03-rule-name"
        data-composition-src="compositions/frames/03-rule-name.html"
        data-start="8"
        data-duration="5.5"
        data-track-index="0"
      ></div>

      <div
        id="el-04-flexible-timing"
        class="scene"
        data-composition-id="04-flexible-timing"
        data-composition-src="compositions/frames/04-flexible-timing.html"
        data-start="13"
        data-duration="5.5"
        data-track-index="1"
      ></div>

      <div
        id="el-05-exemptions"
        class="scene"
        data-composition-id="05-exemptions"
        data-composition-src="compositions/frames/05-exemptions.html"
        data-start="18"
        data-duration="6.5"
        data-track-index="0"
      ></div>

      <div
        id="el-06-the-catch"
        class="scene"
        data-composition-id="06-the-catch"
        data-composition-src="compositions/frames/06-the-catch.html"
        data-start="24"
        data-duration="6.5"
        data-track-index="1"
      ></div>

      <div
        id="el-07-penalty"
        class="scene"
        data-composition-id="07-penalty"
        data-composition-src="compositions/frames/07-penalty.html"
        data-start="30"
        data-duration="5.5"
        data-track-index="0"
      ></div>

      <div
        id="el-08-leverage-play"
        class="scene"
        data-composition-id="08-leverage-play"
        data-composition-src="compositions/frames/08-leverage-play.html"
        data-start="35"
        data-duration="5.5"
        data-track-index="1"
      ></div>

      <div
        id="el-09-cta"
        class="scene"
        data-composition-id="09-cta"
        data-composition-src="compositions/frames/09-cta.html"
        data-start="40"
        data-duration="4"
        data-track-index="0"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-hook", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 4);
        tl.fromTo("#el-02-stakes", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 4);
        tl.to("#el-02-stakes", { y: -1920, duration: 0.5, ease: "power3.inOut" }, 8);
        tl.fromTo("#el-03-rule-name", { y: 1920, opacity: 1 }, { y: 0, duration: 0.5, ease: "power3.inOut" }, 8);
        tl.to("#el-03-rule-name", { y: -1920, duration: 0.5, ease: "power3.inOut" }, 13);
        tl.fromTo("#el-04-flexible-timing", { y: 1920, opacity: 1 }, { y: 0, duration: 0.5, ease: "power3.inOut" }, 13);
        tl.to("#el-04-flexible-timing", { y: -1920, duration: 0.5, ease: "power3.inOut" }, 18);
        tl.fromTo("#el-05-exemptions", { y: 1920, opacity: 1 }, { y: 0, duration: 0.5, ease: "power3.inOut" }, 18);
        tl.to("#el-05-exemptions", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 24);
        tl.fromTo("#el-06-the-catch", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 24);
        tl.to("#el-06-the-catch", { y: -1920, duration: 0.5, ease: "power3.inOut" }, 30);
        tl.fromTo("#el-07-penalty", { y: 1920, opacity: 1 }, { y: 0, duration: 0.5, ease: "power3.inOut" }, 30);
        tl.to("#el-07-penalty", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 35);
        tl.fromTo("#el-08-leverage-play", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 35);
        tl.to("#el-08-leverage-play", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 40);
        tl.fromTo("#el-09-cta", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 40);
        tl.to({}, { duration: 44 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
